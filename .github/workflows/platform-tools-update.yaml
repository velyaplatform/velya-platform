# Platform Tools Update Pipeline
# ADR-0017: Autonomous Maintenance Platform
# Validates and deploys platform controller updates (Kyverno, Karpenter, Prometheus, etc.)

name: "Deploy: Platform Tools"

on:
  pull_request:
    paths:
      - "infra/kubernetes/bootstrap/**"
      - "infra/versions/platform-controllers.json"
      - ".github/workflows/platform-tools-update.yaml"
  push:
    branches: [main]
    paths:
      - "infra/kubernetes/bootstrap/**"
      - "infra/versions/platform-controllers.json"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: platform-tools-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  validate-manifests:
    name: "Validate Platform Manifests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: "v3.16.4"

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Install kubeconform
        run: |
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Bootstrap Kustomizations
        run: |
          FAILED=0
          for dir in infra/kubernetes/bootstrap/*/; do
            if [[ -f "$dir/kustomization.yaml" ]]; then
              echo "--- Validating $dir ---"
              if kustomize build "$dir" > /dev/null 2>&1; then
                echo "✅ $dir"
              else
                echo "❌ $dir"
                FAILED=1
              fi
            fi
          done
          if [[ "$FAILED" == "1" ]]; then
            echo "::error::Some bootstrap kustomizations failed to build"
            exit 1
          fi

      - name: Validate Rendered Manifests
        run: |
          for dir in infra/kubernetes/bootstrap/*/; do
            if [[ -f "$dir/kustomization.yaml" ]]; then
              echo "--- kubeconform: $dir ---"
              kustomize build "$dir" | kubeconform -strict -summary \
                -kubernetes-version 1.32.0 || true
            fi
          done

      - name: Check Version Consistency
        run: |
          # Ensure platform-controllers.json versions match what's in manifests
          if [[ -f "infra/versions/platform-controllers.json" ]]; then
            echo "Platform controller versions:"
            cat infra/versions/platform-controllers.json | jq 'del(._meta)'
          fi

  validate-helm-charts:
    name: "Validate Helm Charts"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: "v3.16.4"

      - name: Lint velya-service chart
        run: helm lint infra/helm/velya-service --strict

      - name: Template velya-service chart
        run: |
          helm template test-release infra/helm/velya-service \
            -f infra/helm/velya-service/values.yaml \
            --kube-version 1.32.0 > /dev/null

      - name: Template with tier overrides
        run: |
          if [[ -f "infra/helm/velya-service/values-tier-overrides.yaml" ]]; then
            helm template test-release infra/helm/velya-service \
              -f infra/helm/velya-service/values.yaml \
              -f infra/helm/velya-service/values-tier-overrides.yaml \
              --kube-version 1.32.0 > /dev/null
          fi
