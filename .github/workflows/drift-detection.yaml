# Drift Detection: Scheduled OpenTofu Plan
# ADR-0017: Autonomous Maintenance Platform
# Detects infrastructure drift by running tofu plan on a schedule.
# Opens an issue if drift is detected.

name: "Detect: Infrastructure Drift"

on:
  schedule:
    - cron: "0 6 * * *" # Daily 06:00 UTC (03:00 BRT)
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to check"
        required: true
        type: choice
        options:
          - dev
          - dev-segregated

permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: drift-detection-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  detect-drift:
    name: "Detect Drift (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          # - staging  # uncomment when staging exists
          # - prod     # uncomment when prod exists

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@592200f5eea5573df2ef756048b84eb5e6b5cd68 # v1.0.5
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Init & Plan
        id: plan
        working-directory: infra/opentofu/live/${{ matrix.environment }}
        run: |
          tofu init
          tofu plan -detailed-exitcode -out=plan.tfplan 2>&1 | tee plan-output.txt
          EXIT_CODE=$?
          echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Exit code 2 means changes detected (drift)
          if [[ "$EXIT_CODE" == "2" ]]; then
            echo "drift-detected=true" >> "$GITHUB_OUTPUT"
            # Extract resource changes
            tofu show -json plan.tfplan | jq '.resource_changes[] | select(.change.actions != ["no-op"]) | {address, actions: .change.actions}' > drift-resources.json
          else
            echo "drift-detected=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Open Drift Issue
        if: steps.plan.outputs.drift-detected == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const env = '${{ matrix.environment }}';
            let driftResources = '(could not parse)';
            try {
              driftResources = fs.readFileSync('infra/opentofu/live/' + env + '/drift-resources.json', 'utf8');
            } catch {}

            // Check for existing open drift issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: `drift,${env}`,
              state: 'open'
            });

            if (existingIssues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: `## Drift still detected — ${new Date().toISOString()}\n\n\`\`\`json\n${driftResources}\n\`\`\``
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔀 Infrastructure drift detected in ${env}`,
                labels: ['drift', env, 'infrastructure', 'automated'],
                body: [
                  `## Infrastructure Drift Detected`,
                  ``,
                  `**Environment:** ${env}`,
                  `**Detected:** ${new Date().toISOString()}`,
                  `**Workflow:** ${context.workflow}`,
                  ``,
                  `### Drifted Resources`,
                  '```json',
                  driftResources,
                  '```',
                  ``,
                  `### Resolution`,
                  `Either:`,
                  `1. Apply the current OpenTofu state to resolve drift`,
                  `2. Import the manual change into the OpenTofu state`,
                  `3. Revert the manual change in AWS`,
                  ``,
                  `---`,
                  `🤖 Generated by [Drift Detection](/.github/workflows/drift-detection.yaml) (ADR-0017)`
                ].join('\n')
              });
            }

      - name: Record Metrics
        if: always()
        run: |
          echo '{"event":"drift-detection","environment":"${{ matrix.environment }}","drift_detected":"${{ steps.plan.outputs.drift-detected }}","timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'
