name: CI Failure Watcher

# Closes the feedback loop when any of the main CI workflows fails on a
# PR. This is the piece the autopilot was missing: a workflow_run
# subscriber that reacts to red checks and leaves a triage comment on
# the PR with the failing job name + the failing step + a link to the
# run, then labels the PR with `ci-red` so humans or Claude Code
# sessions have a single place to see what's broken.
#
# It is intentionally minimal — it only *observes* and *reports*. It
# does not open auto-fix PRs yet; that is the next iteration once the
# watcher has collected enough signal to know which fixes are safe.

on:
  workflow_run:
    workflows:
      - 'CI'
      - 'Security'
      - 'Security Supply Chain'
      - 'UI Quality'
      - 'UI Overlap Gate'
      - 'Visual & Auth Tests'
      - 'Autopilot agents (build + smoke)'
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  triage:
    name: Triage red CI run
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # One github-script step end-to-end. We do PR resolution, job
      # listing, comment, and label inside a single Node runtime so we
      # avoid: (a) ~5 s of cold-boot per extra step, and (b) the
      # interpolation hazard of `${{ steps.*.outputs.* }}` carrying
      # untrusted strings (job names) through shell substitution into
      # template literals.
      - name: Triage and report
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (prs.length === 0) {
              core.warning('No PR attached to workflow_run — skipping triage');
              return;
            }
            const prNumber = prs[0].number;
            const headSha = run.head_sha;
            const wfName = run.name;
            const runUrl = run.html_url;

            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const failing = jobsData.jobs.filter((j) => j.conclusion === 'failure');
            const summary = failing.length === 0
              ? '_(no individual failing jobs could be enumerated)_'
              : failing
                  .map((j) => {
                    const step = (j.steps || []).find((s) => s.conclusion === 'failure');
                    const stepName = step ? step.name : 'unknown step';
                    return `- **${j.name}** — failed at "${stepName}" (<${j.html_url}>)`;
                  })
                  .join('\n');

            const body = [
              `🤖 **CI Failure Watcher**`,
              ``,
              `Workflow **${wfName}** failed on commit \`${headSha.slice(0, 7)}\` (${failing.length} job(s)).`,
              ``,
              summary,
              ``,
              `Run: ${runUrl}`,
              ``,
              `_Posted automatically. See \`.github/workflows/ci-failure-watcher.yaml\` for the watch list._`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['ci-red'],
              });
            } catch (e) {
              core.warning(`Could not add ci-red label: ${e.message}`);
            }
