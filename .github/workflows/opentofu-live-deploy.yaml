# OpenTofu Live Environment Deploy
# ADR-0017: Autonomous Maintenance Platform
# Plan on PR, apply on merge to main, promote through environments

name: "Deploy: OpenTofu Live"

on:
  pull_request:
    paths:
      - "infra/opentofu/live/**"
      - ".github/workflows/opentofu-live-deploy.yaml"
  push:
    branches: [main]
    paths:
      - "infra/opentofu/live/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: opentofu-live-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  detect-environments:
    name: "Detect Changed Environments"
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- infra/opentofu/live/)
          else
            CHANGED=$(git diff --name-only origin/main...HEAD -- infra/opentofu/live/)
          fi

          ENVS=$(echo "$CHANGED" | \
            grep -oP 'infra/opentofu/live/[^/]+' | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "environments=$ENVS" >> "$GITHUB_OUTPUT"
          if [[ "$ENVS" == "[]" ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

  # --- PLAN (on PR) ---
  plan:
    name: "Plan: ${{ matrix.env-path }}"
    needs: detect-environments
    if: github.event_name == 'pull_request' && needs.detect-environments.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env-path: ${{ fromJson(needs.detect-environments.outputs.environments) }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@592200f5eea5573df2ef756048b84eb5e6b5cd68 # v1.0.5
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Init
        working-directory: ${{ matrix.env-path }}
        run: tofu init

      - name: Plan
        id: plan
        working-directory: ${{ matrix.env-path }}
        run: |
          tofu plan -no-color -out=plan.tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.env-path }}/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            const outcome = '${{ steps.plan.outcome }}';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `## OpenTofu Plan — \`${{ matrix.env-path }}\` ${outcome === 'success' ? '✅' : '❌'}`,
                '',
                '<details><summary>Plan output</summary>',
                '',
                '```hcl',
                truncated,
                '```',
                '</details>'
              ].join('\n')
            });

  # --- APPLY (on merge to main, dev only) ---
  apply-dev:
    name: "Apply: Dev"
    needs: detect-environments
    if: github.event_name == 'push' && needs.detect-environments.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@592200f5eea5573df2ef756048b84eb5e6b5cd68 # v1.0.5
        with:
          tofu_version: "1.9.0"

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Init & Apply (dev)
        working-directory: infra/opentofu/live/dev
        run: |
          tofu init
          tofu apply -auto-approve 2>&1 | tee apply-output.txt

      - name: Verify Apply
        id: verify
        working-directory: infra/opentofu/live/dev
        run: |
          # Run plan again to verify no drift remains
          tofu plan -detailed-exitcode 2>&1 || EXIT=$?
          if [[ "${EXIT:-0}" == "2" ]]; then
            echo "::error::Post-apply drift detected"
            echo "clean=false" >> "$GITHUB_OUTPUT"
          else
            echo "clean=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open Issue on Apply Failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 OpenTofu apply failed in dev',
              labels: ['infrastructure', 'automated', 'incident'],
              body: `OpenTofu apply failed for dev environment.\n\nCommit: ${context.sha}\nWorkflow: ${context.workflow}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
