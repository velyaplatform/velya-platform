# Reusable Workflow: Helm Chart Validation
# ADR-0017: Autonomous Maintenance Platform

name: "Reusable: Helm Validate"

on:
  workflow_call:
    inputs:
      chart-path:
        description: "Path to the Helm chart directory"
        required: true
        type: string
      values-files:
        description: "Comma-separated list of values files to template"
        required: false
        type: string
        default: "values.yaml"
      kube-version:
        description: "Kubernetes version for template validation"
        required: false
        type: string
        default: "1.32.0"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: "Validate Helm Chart"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: "v3.16.4"

      - name: Helm Lint
        id: lint
        run: |
          helm lint "${{ inputs.chart-path }}" --strict
        continue-on-error: true

      - name: Helm Template (per values file)
        id: template
        run: |
          IFS=',' read -ra VALUES <<< "${{ inputs.values-files }}"
          FAILED=0
          for vf in "${VALUES[@]}"; do
            vf=$(echo "$vf" | xargs)
            echo "--- Templating with $vf ---"
            if ! helm template test-release "${{ inputs.chart-path }}" \
              -f "${{ inputs.chart-path }}/$vf" \
              --kube-version "${{ inputs.kube-version }}" \
              > /dev/null 2>&1; then
              echo "::error::helm template failed with $vf"
              FAILED=1
            else
              echo "✅ $vf passed"
            fi
          done
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Helm Dependency Check
        run: |
          if [[ -f "${{ inputs.chart-path }}/Chart.lock" ]]; then
            helm dependency build "${{ inputs.chart-path }}"
          fi

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Rendered Manifests
        id: kubeconform
        run: |
          helm template test-release "${{ inputs.chart-path }}" \
            --kube-version "${{ inputs.kube-version }}" | \
          kubeconform -strict -summary \
            -kubernetes-version "${{ inputs.kube-version }}" \
            -output json | tee kubeconform-output.json
        continue-on-error: true

      - name: Fail if checks failed
        if: always()
        run: |
          if [[ "${{ steps.lint.outcome }}" == "failure" ]] || \
             [[ "${{ steps.template.outputs.failed }}" == "1" ]] || \
             [[ "${{ steps.kubeconform.outcome }}" == "failure" ]]; then
            echo "::error::Helm validation failed"
            exit 1
          fi
