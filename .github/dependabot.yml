# Dependabot configuration — free, GitHub-native dependency updater.
# Pins all PRs to a single weekly cadence so the team isn't paged constantly.
# Patches and minor versions are auto-grouped; majors get their own PR each.
#
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ----- Root npm workspaces (Next.js web, packages, platform) -----
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Sao_Paulo'
    open-pull-requests-limit: 10
    versioning-strategy: 'increase'
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      next-stack:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react*'
        update-types:
          - 'minor'
          - 'patch'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
        update-types:
          - 'minor'
          - 'patch'
      tooling:
        patterns:
          - 'typescript'
          - 'eslint*'
          - 'prettier'
          - '@typescript-eslint/*'
        update-types:
          - 'minor'
          - 'patch'
      testing:
        patterns:
          - 'vitest'
          - '@playwright/*'
          - '@vitest/*'
          - '@testing-library/*'
        update-types:
          - 'minor'
          - 'patch'
      observability:
        patterns:
          - '@opentelemetry/*'
          - 'pino'
          - 'pino-*'
        update-types:
          - 'minor'
          - 'patch'

  # ----- GitHub Actions used in workflows -----
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Sao_Paulo'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'security'
    commit-message:
      prefix: 'chore(actions)'

  # ----- Docker base images -----
  - package-ecosystem: 'docker'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Sao_Paulo'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'docker'
      - 'security'
    commit-message:
      prefix: 'chore(docker)'
