# Updatecli — Platform Controller Version Detection
# Covers sources that Renovate regex manager cannot reach
# ADR-0017: Autonomous Maintenance Platform

name: "Platform Controller Version Updates"

scms:
  velya-platform:
    kind: github
    spec:
      user: "updatecli-bot"
      owner: "{{ requiredEnv .GITHUB_OWNER }}"
      repository: "velya-platform"
      branch: "main"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'

sources:
  # --- Kyverno ---
  kyverno:
    name: "Kyverno latest release"
    kind: githubrelease
    spec:
      owner: "kyverno"
      repository: "kyverno"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: ">=1.0.0"

  # --- Karpenter ---
  karpenter:
    name: "Karpenter latest release"
    kind: githubrelease
    spec:
      owner: "aws"
      repository: "karpenter-provider-aws"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  # --- cert-manager ---
  cert-manager:
    name: "cert-manager latest release"
    kind: githubrelease
    spec:
      owner: "cert-manager"
      repository: "cert-manager"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  # --- external-secrets ---
  external-secrets:
    name: "External Secrets Operator latest release"
    kind: githubrelease
    spec:
      owner: "external-secrets"
      repository: "external-secrets"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  # --- ArgoCD ---
  argocd:
    name: "ArgoCD latest release"
    kind: githubrelease
    spec:
      owner: "argoproj"
      repository: "argo-cd"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver

  # --- Prometheus Stack (kube-prometheus-stack chart) ---
  prometheus-stack:
    name: "kube-prometheus-stack Helm chart"
    kind: helmchart
    spec:
      url: "https://prometheus-community.github.io/helm-charts"
      name: "kube-prometheus-stack"
      versionfilter:
        kind: semver

  # --- Loki ---
  loki:
    name: "Loki Helm chart"
    kind: helmchart
    spec:
      url: "https://grafana.github.io/helm-charts"
      name: "loki"
      versionfilter:
        kind: semver

  # --- Tempo ---
  tempo:
    name: "Tempo Helm chart"
    kind: helmchart
    spec:
      url: "https://grafana.github.io/helm-charts"
      name: "tempo"
      versionfilter:
        kind: semver

  # --- NATS ---
  nats:
    name: "NATS Helm chart"
    kind: helmchart
    spec:
      url: "https://nats-io.github.io/k8s/helm/charts/"
      name: "nats"
      versionfilter:
        kind: semver

conditions: {}

targets:
  # Each target writes a version file that downstream workflows can consume
  kyverno-version:
    name: "Update Kyverno version tracker"
    kind: file
    sourceid: kyverno
    spec:
      file: "infra/versions/platform-controllers.json"
      matchpattern: '"kyverno": "[^"]*"'
      replacepattern: '"kyverno": "{{ source "kyverno" }}"'
    scmid: velya-platform

  karpenter-version:
    name: "Update Karpenter version tracker"
    kind: file
    sourceid: karpenter
    spec:
      file: "infra/versions/platform-controllers.json"
      matchpattern: '"karpenter": "[^"]*"'
      replacepattern: '"karpenter": "{{ source "karpenter" }}"'
    scmid: velya-platform

  cert-manager-version:
    name: "Update cert-manager version tracker"
    kind: file
    sourceid: cert-manager
    spec:
      file: "infra/versions/platform-controllers.json"
      matchpattern: '"cert-manager": "[^"]*"'
      replacepattern: '"cert-manager": "{{ source "cert-manager" }}"'
    scmid: velya-platform

  external-secrets-version:
    name: "Update External Secrets version tracker"
    kind: file
    sourceid: external-secrets
    spec:
      file: "infra/versions/platform-controllers.json"
      matchpattern: '"external-secrets": "[^"]*"'
      replacepattern: '"external-secrets": "{{ source "external-secrets" }}"'
    scmid: velya-platform

  argocd-version:
    name: "Update ArgoCD version tracker"
    kind: file
    sourceid: argocd
    spec:
      file: "infra/versions/platform-controllers.json"
      matchpattern: '"argocd": "[^"]*"'
      replacepattern: '"argocd": "{{ source "argocd" }}"'
    scmid: velya-platform

actions:
  default:
    kind: github/pullrequest
    scmid: velya-platform
    spec:
      title: "chore(platform): update controller versions"
      labels:
        - "dependencies"
        - "platform"
        - "automated"
      body: |
        ## Automated Platform Controller Update

        This PR was generated by Updatecli after detecting new versions
        of platform controllers.

        **Review required before merge** — platform controller updates
        are classified as risk:medium or risk:high.

        See ADR-0017 for promotion policy.
