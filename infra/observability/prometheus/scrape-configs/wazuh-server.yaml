# ============================================
# Prometheus Scrape Config - Wazuh Server
# Add this to the prometheus scrape_configs section
# ============================================

# Node Exporter - system-level metrics (CPU, memory, disk, network)
- job_name: "wazuh-node"
  static_configs:
    - targets: ["${WAZUH_PRIVATE_IP}:9100"]
      labels:
        instance: "wazuh-server"
        service: "siem"
        environment: "${ENVIRONMENT}"
  scrape_interval: 30s
  scrape_timeout: 10s
  metrics_path: /metrics

# Wazuh Exporter - application-level metrics (agents, alerts, indexer health)
- job_name: "wazuh-app"
  static_configs:
    - targets: ["${WAZUH_PRIVATE_IP}:9101"]
      labels:
        instance: "wazuh-server"
        service: "siem"
        environment: "${ENVIRONMENT}"
  scrape_interval: 60s
  scrape_timeout: 15s
  metrics_path: /metrics

