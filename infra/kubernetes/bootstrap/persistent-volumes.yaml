apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: velya-web-audit-pvc
  namespace: velya-dev-web
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/tier: web
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: velya-web-events-pvc
  namespace: velya-dev-web
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/tier: web
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
