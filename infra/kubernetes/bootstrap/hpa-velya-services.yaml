# HorizontalPodAutoscalers — Serviços Realtime Velya
#
# MIGRADO PARA KEDA (2026-04-12)
# ================================
# Os HPAs manuais para patient-flow, task-inbox, discharge-orchestrator e
# ai-gateway foram removidos deste arquivo. O autoscaling desses workloads
# agora é gerenciado exclusivamente por KEDA ScaledObjects em
# keda-scaledobjects.yaml, que inclui as behavior policies (stabilization
# windows, scale-up/down rates) que antes estavam aqui.
#
# Motivo: o webhook de validação do KEDA (vscaledobject.kb.io) rejeita
# ScaledObjects quando já existe um HPA manual para o mesmo Deployment.
# KEDA cria e gerencia seu próprio HPA internamente — ter ambos causa
# conflito de ownership e bloqueia o sync do ArgoCD.
#
# Referência: docs/scaling/hpa-keda-vpa-strategy.md
# ADR: a decisão de consolidar em KEDA está documentada na PR que removeu
# este conflito.
#
# Se um novo serviço precisar de HPA sem KEDA, adicione aqui.
# Para serviços com KEDA ScaledObject, NUNCA adicione um HPA manual.
