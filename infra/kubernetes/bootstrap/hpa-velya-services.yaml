    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: async-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-inbox
  minReplicas: 1
  maxReplicas: 4
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# discharge-orchestrator — workflow durável, escala moderada
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: discharge-orchestrator-hpa
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: async-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: discharge-orchestrator
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
# ai-gateway — inferência LLM, escala com contenção de custo
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-gateway-hpa
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: heavy-ai-analytics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-gateway
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 90
      policies:
        - type: Pods
          value: 1
          periodSeconds: 90
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
