---
# KEDA ScaledObjects — Velya Platform
# Escala orientada por evento/fila/métricas Prometheus
# Referência: docs/scaling/hpa-keda-vpa-strategy.md

# task-inbox — escala por profundidade de fila NATS JetStream
# Quando há muitas tarefas pendentes, escala workers automaticamente
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: task-inbox-nats-scaler
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: async-worker
spec:
  scaleTargetRef:
    name: task-inbox
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 5
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090
        metricName: velya_task_inbox_pending_tasks
        threshold: "10"
        query: |
          sum(velya_task_inbox_pending_total{namespace="velya-dev-core"})
---
# discharge-orchestrator — escala por altas hospitalares pendentes
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: discharge-orchestrator-queue-scaler
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: async-worker
spec:
  scaleTargetRef:
    name: discharge-orchestrator
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 3
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090
        metricName: velya_discharge_pending_total
        threshold: "5"
        query: |
          sum(velya_discharge_pending_total{namespace="velya-dev-core"})
---
# ai-gateway — escala por requisições de inferência pendentes
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-gateway-inference-scaler
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: heavy-ai-analytics
spec:
  scaleTargetRef:
    name: ai-gateway
  pollingInterval: 15
  cooldownPeriod: 180
  minReplicaCount: 1
  maxReplicaCount: 3
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090
        metricName: velya_ai_inference_queue_depth
        threshold: "5"
        query: |
          sum(rate(http_requests_total{namespace="velya-dev-platform",job="velya-ai-gateway"}[2m]))
---
# velya-web — escala por tráfego HTTP ativo (frontend Next.js)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: velya-web-http-scaler
  namespace: velya-dev-web
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: realtime-app
spec:
  scaleTargetRef:
    name: velya-web
  pollingInterval: 15
  cooldownPeriod: 180
  minReplicaCount: 1
  maxReplicaCount: 4
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090
        metricName: velya_web_rps
        threshold: "50"
        query: |
          sum(rate(http_requests_total{namespace="velya-dev-web",job="velya-web"}[2m]))
