---
# KEDA ScaledObjects — Velya Platform (ativos)
# Apenas ScaledObjects com triggers que funcionam no ambiente atual.
# ScaledObjects dependentes de NATS JetStream estão em bootstrap-pending-crds/
# Referência: docs/scaling/hpa-keda-vpa-strategy.md

# velya-web — escala por tráfego HTTP ativo (frontend Next.js)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: velya-web-http-scaler
  namespace: velya-dev-web
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: realtime-app
spec:
  scaleTargetRef:
    name: velya-web
  pollingInterval: 15
  cooldownPeriod: 180
  minReplicaCount: 1
  maxReplicaCount: 4
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090
        metricName: velya_web_rps
        threshold: "50"
        query: |
          sum(rate(http_requests_total{namespace="velya-dev-web",job="velya-web"}[2m]))
