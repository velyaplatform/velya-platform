# Ingress resources com hosts .local para desenvolvimento sem IP na URL
# Para funcionar, adicionar ao /etc/hosts do host:
#   172.19.0.100  velya.local grafana.velya.local argocd.velya.local prometheus.velya.local
#   172.19.0.100  patient-flow.velya.local discharge.velya.local task-inbox.velya.local
#   172.19.0.100  ai-gateway.velya.local audit.velya.local agents.velya.local
#   172.19.0.100  policy-engine.velya.local memory-service.velya.local decision-log.velya.local
#
# Comando rápido:
#   echo '172.19.0.100  velya.local grafana.velya.local argocd.velya.local prometheus.velya.local patient-flow.velya.local discharge.velya.local task-inbox.velya.local ai-gateway.velya.local audit.velya.local agents.velya.local policy-engine.velya.local memory-service.velya.local decision-log.velya.local' | sudo tee -a /etc/hosts

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velya-web-local
  namespace: velya-dev-web
spec:
  ingressClassName: nginx
  rules:
    - host: velya.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: velya-web
                port:
                  number: 80
