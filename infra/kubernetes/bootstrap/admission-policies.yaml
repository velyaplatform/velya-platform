# ValidatingAdmissionPolicies — Velya Platform
# K8s native admission control (v1.28+, GA in v1.30)
# Enforces resource standards across all velya.io/managed namespaces.
# Mode: Warn (non-blocking) — switch to Fail after stabilization.
#
# Policies:
#   a) Require resource requests/limits on all containers
#   b) Require liveness/readiness probes
#   c) Require velya.io/owner label
#   d) Require non-root security context
#   e) Block :latest image tag

# ============================================================
# a) Require resource requests/limits
# ============================================================

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: velya-require-resources
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"
  validations:
    - expression: "object.spec.template.spec.containers.all(c, has(c.resources) && has(c.resources.requests))"
      message: "Todos os containers devem ter resources.requests definidos"
    - expression: "object.spec.template.spec.containers.all(c, has(c.resources) && has(c.resources.limits))"
      message: "Todos os containers devem ter resources.limits definidos"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: velya-require-resources-binding
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  policyName: velya-require-resources
  validationActions: [Warn]
  matchResources:
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"

---
# ============================================================
# b) Require liveness/readiness probes
# ============================================================

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: velya-require-probes
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"
  validations:
    - expression: "object.spec.template.spec.containers.all(c, has(c.livenessProbe))"
      message: "Todos os containers devem ter livenessProbe definido"
    - expression: "object.spec.template.spec.containers.all(c, has(c.readinessProbe))"
      message: "Todos os containers devem ter readinessProbe definido"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: velya-require-probes-binding
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  policyName: velya-require-probes
  validationActions: [Warn]
  matchResources:
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"

---
# ============================================================
# c) Require velya.io/owner label
# ============================================================

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: velya-require-owner-label
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"
  validations:
    - expression: "has(object.metadata.labels) && 'velya.io/owner' in object.metadata.labels"
      message: "Deployments devem ter o label velya.io/owner definido"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: velya-require-owner-label-binding
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  policyName: velya-require-owner-label
  validationActions: [Warn]
  matchResources:
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"

---
# ============================================================
# d) Require non-root security context
# ============================================================

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: velya-require-nonroot
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"
  validations:
    - expression: >-
        has(object.spec.template.spec.securityContext) &&
        (
          (has(object.spec.template.spec.securityContext.runAsNonRoot) && object.spec.template.spec.securityContext.runAsNonRoot == true) ||
          (has(object.spec.template.spec.securityContext.runAsUser) && object.spec.template.spec.securityContext.runAsUser > 0)
        )
      message: "Pod securityContext deve ter runAsNonRoot: true ou runAsUser > 0"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: velya-require-nonroot-binding
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  policyName: velya-require-nonroot
  validationActions: [Warn]
  matchResources:
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"

---
# ============================================================
# e) Block :latest image tag
# ============================================================

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: velya-block-latest-tag
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"
  validations:
    - expression: "object.spec.template.spec.containers.all(c, !c.image.endsWith(':latest'))"
      message: "Imagens com tag :latest sao proibidas — pin uma versao especifica"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: velya-block-latest-tag-binding
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy-class: assurance
spec:
  policyName: velya-block-latest-tag
  validationActions: [Warn]
  matchResources:
    namespaceSelector:
      matchLabels:
        velya.io/managed: "true"
