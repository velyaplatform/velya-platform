# PodDisruptionBudgets — Velya Platform
# Garante alta disponibilidade durante manutenções, atualizações e evicções de nós.
# Regra: minAvailable: 1 para todos os serviços críticos.
# Referência: docs/agents/continuous-runtime-architecture.md

# --- velya-dev-core ---

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: patient-flow-pdb
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/tier: core
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: patient-flow
---
