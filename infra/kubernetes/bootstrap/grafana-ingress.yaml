---
# Ingress para Grafana — acesso via nip.io no kind
# Grafana ficará acessível em: http://grafana.172.19.0.6.nip.io
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: velya-dev-observability
  labels:
    app.kubernetes.io/part-of: velya-platform
  annotations:
    nginx.ingress.kubernetes.io/service-upstream: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.172.19.0.6.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80
