---
# CronJobs Sentinela — Velya Platform 24/7 Operations
# Loops contínuos para heartbeat, watchdog, drift detection e cost monitoring
# Referência: docs/agents/24x7-operating-model.md
#
# Visibility layer: each CronJob POSTs structured JSON results to a webhook
# (VELYA_WEBHOOK_URL) and creates K8s Events for critical findings.

# Loop curto: health scan geral a cada 5 minutos
# Verifica pods parados, filas crescendo, scorecard drift
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-sentinel-health-scan
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/agent-class: sentinel
    velya.io/loop: short
spec:
  schedule: '*/5 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: velya-platform
            velya.io/agent-class: sentinel
        spec:
          serviceAccountName: velya-sentinel-sa
          restartPolicy: Never
          priorityClassName: velya-batch
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: health-scan
              image: alpine/k8s:1.31.5
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ['ALL']
              env:
                - name: VELYA_WEBHOOK_URL
                  value: 'http://velya-web.velya-dev-web.svc.cluster.local:3000/api/sentinel'
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              command:
                - /bin/sh
                - -c
                - |
                  echo "=== Velya Health Scan $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
                  TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  STATUS="ok"
                  FINDINGS=""

                  # Verifica pods não-Running nos namespaces Velya
                  FAILED=$(kubectl get pods -A -l app.kubernetes.io/part-of=velya-platform \
                    --field-selector='status.phase!=Running,status.phase!=Succeeded' \
                    --no-headers 2>/dev/null | grep -v Completed | wc -l)
                  echo "Pods com problema: $FAILED"
                  if [ "$FAILED" -gt 0 ]; then
                    FAILED_PODS=$(kubectl get pods -A -l app.kubernetes.io/part-of=velya-platform \
                      --field-selector='status.phase!=Running,status.phase!=Succeeded' \
                      --no-headers 2>/dev/null | grep -v Completed | awk '{print $1"/"$2}' | head -10 | tr '\n' ',' | sed 's/,$//')
                    FINDINGS="${FINDINGS}{\"type\":\"unhealthy-pods\",\"count\":$FAILED,\"pods\":\"$FAILED_PODS\"},"
                    STATUS="warning"
                  fi

                  # Verifica restarts altos (>5 em qualquer pod Velya)
                  HIGH_RESTARTS=$(kubectl get pods -A -l app.kubernetes.io/part-of=velya-platform \
                    --no-headers 2>/dev/null | awk '$5 > 5 {print $2, $5}')
                  if [ -n "$HIGH_RESTARTS" ]; then
                    echo "ALERTA: Pods com restarts altos:"
                    echo "$HIGH_RESTARTS"
                    RESTART_LIST=$(echo "$HIGH_RESTARTS" | awk '{printf "%s(%s) ", $1, $2}' | sed 's/ $//')
                    FINDINGS="${FINDINGS}{\"type\":\"high-restarts\",\"detail\":\"$RESTART_LIST\"},"
                    STATUS="critical"
                  fi

                  # Verifica ArgoCD Applications em estado degradado
                  echo "=== ArgoCD Applications ==="
                  ARGOCD_OUT=$(kubectl get applications -n argocd --no-headers 2>/dev/null)
                  if [ -z "$ARGOCD_OUT" ]; then
                    echo "Nenhuma Application ArgoCD configurada — GAP CRÍTICO"
                    FINDINGS="${FINDINGS}{\"type\":\"argocd-missing\",\"detail\":\"no ArgoCD Applications found\"},"
                    STATUS="critical"
                  else
                    echo "$ARGOCD_OUT"
                    DEGRADED=$(echo "$ARGOCD_OUT" | grep -i -E "Degraded|Unknown" | wc -l)
                    if [ "$DEGRADED" -gt 0 ]; then
                      FINDINGS="${FINDINGS}{\"type\":\"argocd-degraded\",\"count\":$DEGRADED},"
                      STATUS="critical"
                    fi
                  fi

                  # Verifica KEDA ScaledObjects com erro
                  echo "=== KEDA ScaledObjects ==="
                  KEDA_ISSUES=$(kubectl get scaledobjects -A --no-headers 2>/dev/null | grep -v "True" | grep velya)
                  if [ -n "$KEDA_ISSUES" ]; then
                    echo "$KEDA_ISSUES"
                    FINDINGS="${FINDINGS}{\"type\":\"keda-errors\",\"detail\":\"ScaledObjects not ready\"},"
                    [ "$STATUS" = "ok" ] && STATUS="warning"
                  else
                    echo "Todos ScaledObjects OK"
                  fi

                  echo "=== Scan concluído ==="

                  # Remove trailing comma from findings
                  FINDINGS=$(echo "$FINDINGS" | sed 's/,$//')

                  # Build JSON result
                  RESULT=$(cat <<ENDJSON
                  {
                    "sentinel": "health-scan",
                    "timestamp": "$TIMESTAMP",
                    "status": "$STATUS",
                    "findings": [$FINDINGS],
                    "cluster": "kind-velya-local"
                  }
                  ENDJSON
                  )

                  echo "JSON payload: $RESULT"

                  # POST to webhook (best-effort, don't fail the job)
                  curl -s -X POST -H "Content-Type: application/json" \
                    -d "$RESULT" \
                    "${VELYA_WEBHOOK_URL}" \
                    --max-time 5 || true

                  # Create K8s Event for critical findings
                  if [ "$STATUS" = "critical" ]; then
                    SUMMARY="health-scan: $FAILED unhealthy pods, status=$STATUS"
                    kubectl create event sentinel-health-scan-alert \
                      --namespace velya-dev-core \
                      --type=Warning \
                      --reason="SentinelAlert" \
                      --message="$SUMMARY" \
                      --field-manager=velya-sentinel 2>/dev/null || true
                  fi
---
# Loop contínuo: watchdog de silêncio a cada 10 minutos
# Detecta agents/serviços silenciosos por mais de 30 minutos
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-watchdog-silence-detector
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/agent-class: watchdog
    velya.io/loop: short
spec:
  schedule: '*/10 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      activeDeadlineSeconds: 480
      backoffLimit: 0
      template:
        metadata:
          labels:
            velya.io/agent-class: watchdog
        spec:
          serviceAccountName: velya-sentinel-sa
          restartPolicy: Never
          priorityClassName: velya-batch
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: silence-detector
              image: alpine/k8s:1.31.5
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ['ALL']
              env:
                - name: VELYA_WEBHOOK_URL
                  value: 'http://velya-web.velya-dev-web.svc.cluster.local:3000/api/sentinel'
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              command:
                - /bin/sh
                - -c
                - |
                  echo "=== Velya Silence Detector $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
                  TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  STATUS="ok"
                  FINDINGS=""

                  PROMETHEUS="http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090"

                  # Verifica serviços Velya silenciosos (up=0 por mais de 5 min)
                  QUERY='up{job=~"velya-.*"} == 0'
                  PROM_RESULT=$(curl -s "$PROMETHEUS/api/v1/query?query=$(echo $QUERY | python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read()))' 2>/dev/null)" 2>/dev/null)

                  echo "Verificação de silêncio: $PROM_RESULT"

                  # Parse silent service count
                  SILENT_COUNT=$(echo "$PROM_RESULT" | python3 -c "
                  import json,sys
                  try:
                    data=json.load(sys.stdin)
                    print(len(data.get('data',{}).get('result',[])))
                  except:
                    print(0)
                  " 2>/dev/null || echo "0")

                  if [ "$SILENT_COUNT" -gt 0 ] 2>/dev/null; then
                    FINDINGS="${FINDINGS}{\"type\":\"silent-services\",\"count\":$SILENT_COUNT,\"query\":\"up==0\"},"
                    STATUS="critical"
                  fi

                  # Verifica Loki (coleta de logs)
                  LOKI_UP=$(curl -s "http://loki-gateway.velya-dev-observability.svc.cluster.local/ready" 2>/dev/null || echo "DOWN")
                  echo "Loki status: $LOKI_UP"

                  if [ "$LOKI_UP" = "DOWN" ]; then
                    FINDINGS="${FINDINGS}{\"type\":\"loki-down\",\"detail\":\"Loki gateway not reachable\"},"
                    [ "$STATUS" = "ok" ] && STATUS="warning"
                  fi

                  # Verifica Prometheus reachability
                  PROM_UP=$(curl -s "$PROMETHEUS/-/ready" --max-time 3 2>/dev/null || echo "DOWN")
                  if [ "$PROM_UP" = "DOWN" ]; then
                    FINDINGS="${FINDINGS}{\"type\":\"prometheus-down\",\"detail\":\"Prometheus not reachable\"},"
                    STATUS="critical"
                  fi

                  echo "=== Detector concluído ==="

                  # Remove trailing comma from findings
                  FINDINGS=$(echo "$FINDINGS" | sed 's/,$//')

                  # Build JSON result
                  RESULT=$(cat <<ENDJSON
                  {
                    "sentinel": "silence-detector",
                    "timestamp": "$TIMESTAMP",
                    "status": "$STATUS",
                    "findings": [$FINDINGS],
                    "cluster": "kind-velya-local"
                  }
                  ENDJSON
                  )

                  echo "JSON payload: $RESULT"

                  # POST to webhook (best-effort, don't fail the job)
                  curl -s -X POST -H "Content-Type: application/json" \
                    -d "$RESULT" \
                    "${VELYA_WEBHOOK_URL}" \
                    --max-time 5 || true

                  # Create K8s Event for critical findings
                  if [ "$STATUS" = "critical" ]; then
                    SUMMARY="silence-detector: $SILENT_COUNT silent services, status=$STATUS"
                    kubectl create event sentinel-silence-detector-alert \
                      --namespace velya-dev-core \
                      --type=Warning \
                      --reason="SentinelAlert" \
                      --message="$SUMMARY" \
                      --field-manager=velya-sentinel 2>/dev/null || true
                  fi
---
# Loop horário: cost monitor — detecta spikes de uso de recursos
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-cost-monitor-hourly
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/agent-class: sentinel
    velya.io/loop: hourly
spec:
  schedule: '0 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        metadata:
          labels:
            velya.io/agent-class: sentinel
        spec:
          serviceAccountName: velya-sentinel-sa
          restartPolicy: OnFailure
          priorityClassName: velya-batch
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cost-monitor
              image: alpine/k8s:1.31.5
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ['ALL']
              env:
                - name: VELYA_WEBHOOK_URL
                  value: 'http://velya-web.velya-dev-web.svc.cluster.local:3000/api/sentinel'
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              command:
                - /bin/sh
                - -c
                - |
                  echo "=== Velya Cost Monitor $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
                  TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  STATUS="ok"
                  FINDINGS=""

                  # Verifica uso de ResourceQuota por namespace
                  for NS in velya-dev-core velya-dev-platform velya-dev-agents velya-dev-web; do
                    echo "== Namespace: $NS =="
                    QUOTA_DATA=$(kubectl get resourcequota -n $NS --no-headers 2>/dev/null)
                    if [ -n "$QUOTA_DATA" ]; then
                      echo "$QUOTA_DATA" | while read name rest; do
                        USAGE=$(kubectl describe resourcequota "$name" -n "$NS" 2>/dev/null | grep -E 'requests\.(cpu|memory)|limits\.(cpu|memory)' | head -6)
                        echo "$USAGE"
                      done
                    fi

                    # Check for pods in namespace with no resource limits
                    NO_LIMITS=$(kubectl get pods -n $NS -o json 2>/dev/null | \
                      python3 -c "
                  import json,sys
                  try:
                    data=json.load(sys.stdin)
                    count=0
                    for item in data.get('items',[]):
                      for c in item['spec'].get('containers',[]):
                        if not c.get('resources',{}).get('limits'):
                          count+=1
                    print(count)
                  except:
                    print(0)
                  " 2>/dev/null || echo "0")
                    if [ "$NO_LIMITS" -gt 0 ] 2>/dev/null; then
                      FINDINGS="${FINDINGS}{\"type\":\"no-resource-limits\",\"namespace\":\"$NS\",\"containers\":$NO_LIMITS},"
                      [ "$STATUS" = "ok" ] && STATUS="warning"
                    fi
                  done

                  # Verifica Prometheus cardinality (indicador de custo de observabilidade)
                  echo "== Prometheus Series Count =="
                  SERIES_RAW=$(kubectl exec -n velya-dev-observability \
                    prometheus-prometheus-kube-prometheus-prometheus-0 \
                    -- wget -qO- "http://localhost:9090/api/v1/query?query=prometheus_tsdb_head_series" \
                    2>/dev/null)
                  SERIES_COUNT=$(echo "$SERIES_RAW" | grep -o '"value":\[[^]]*\]' || echo "unknown")
                  echo "Series: $SERIES_COUNT"

                  if [ "$SERIES_COUNT" != "unknown" ]; then
                    FINDINGS="${FINDINGS}{\"type\":\"prometheus-cardinality\",\"raw\":\"$SERIES_COUNT\"},"
                  else
                    echo "Não foi possível verificar cardinality"
                    FINDINGS="${FINDINGS}{\"type\":\"prometheus-cardinality\",\"detail\":\"unable to query\"},"
                  fi

                  echo "=== Monitor concluído ==="

                  # Remove trailing comma from findings
                  FINDINGS=$(echo "$FINDINGS" | sed 's/,$//')

                  # Build JSON result
                  RESULT=$(cat <<ENDJSON
                  {
                    "sentinel": "cost-monitor",
                    "timestamp": "$TIMESTAMP",
                    "status": "$STATUS",
                    "findings": [$FINDINGS],
                    "cluster": "kind-velya-local"
                  }
                  ENDJSON
                  )

                  echo "JSON payload: $RESULT"

                  # POST to webhook (best-effort, don't fail the job)
                  curl -s -X POST -H "Content-Type: application/json" \
                    -d "$RESULT" \
                    "${VELYA_WEBHOOK_URL}" \
                    --max-time 5 || true

                  # Create K8s Event for critical findings
                  if [ "$STATUS" = "critical" ]; then
                    SUMMARY="cost-monitor: resource cost anomalies detected, status=$STATUS"
                    kubectl create event sentinel-cost-monitor-alert \
                      --namespace velya-dev-core \
                      --type=Warning \
                      --reason="SentinelAlert" \
                      --message="$SUMMARY" \
                      --field-manager=velya-sentinel 2>/dev/null || true
                  fi
---
# Loop diário: executive digest — resume estado da plataforma
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-daily-digest
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/agent-class: sentinel
    velya.io/loop: daily
spec:
  schedule: '0 7 * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            velya.io/agent-class: sentinel
        spec:
          serviceAccountName: velya-sentinel-sa
          restartPolicy: OnFailure
          priorityClassName: velya-batch
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: daily-digest
              image: alpine/k8s:1.31.5
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ['ALL']
              env:
                - name: VELYA_WEBHOOK_URL
                  value: 'http://velya-web.velya-dev-web.svc.cluster.local:3000/api/sentinel'
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  echo "=============================="
                  echo "VELYA DAILY DIGEST"
                  echo "Data: $(date -u +%Y-%m-%d)"
                  echo "=============================="
                  TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  STATUS="ok"
                  FINDINGS=""
                  TOTAL_RUNNING=0
                  TOTAL_FAILED=0

                  echo ""
                  echo "## STATUS DO CLUSTER"
                  NODE_INFO=$(kubectl get nodes --no-headers 2>/dev/null | awk '{print $1, $2, $3}')
                  echo "$NODE_INFO"
                  NODE_COUNT=$(echo "$NODE_INFO" | wc -l)
                  NOT_READY=$(echo "$NODE_INFO" | grep -cv "Ready" || echo "0")
                  if [ "$NOT_READY" -gt 0 ] 2>/dev/null; then
                    FINDINGS="${FINDINGS}{\"type\":\"nodes-not-ready\",\"count\":$NOT_READY},"
                    STATUS="critical"
                  fi

                  echo ""
                  echo "## PODS POR NAMESPACE"
                  NS_SUMMARY=""
                  for NS in velya-dev-core velya-dev-platform velya-dev-agents velya-dev-web velya-dev-observability; do
                    RUNNING=$(kubectl get pods -n $NS --no-headers 2>/dev/null | grep -c Running || echo 0)
                    FAILED=$(kubectl get pods -n $NS --no-headers 2>/dev/null | grep -cv Running || echo 0)
                    echo "  $NS: $RUNNING Running, $FAILED outros"
                    TOTAL_RUNNING=$((TOTAL_RUNNING + RUNNING))
                    TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
                    NS_SUMMARY="${NS_SUMMARY}{\"namespace\":\"$NS\",\"running\":$RUNNING,\"other\":$FAILED},"
                    if [ "$FAILED" -gt 0 ] 2>/dev/null; then
                      [ "$STATUS" = "ok" ] && STATUS="warning"
                    fi
                  done
                  FINDINGS="${FINDINGS}{\"type\":\"pod-summary\",\"totalRunning\":$TOTAL_RUNNING,\"totalOther\":$TOTAL_FAILED,\"namespaces\":[${NS_SUMMARY%,}]},"

                  echo ""
                  echo "## HPAs ATIVOS"
                  HPA_OUT=$(kubectl get hpa -A --no-headers 2>/dev/null | grep velya | awk '{print $1, $2, $6"/"$5, $7"/"$8}')
                  echo "$HPA_OUT"
                  HPA_COUNT=$(echo "$HPA_OUT" | grep -c . || echo "0")
                  FINDINGS="${FINDINGS}{\"type\":\"hpa-count\",\"count\":$HPA_COUNT},"

                  echo ""
                  echo "## KEDA SCALED OBJECTS"
                  KEDA_OUT=$(kubectl get scaledobjects -A --no-headers 2>/dev/null | awk '{print $1, $2, $4, $5}')
                  echo "$KEDA_OUT"

                  echo ""
                  echo "## ALERTAS PROMETHEUS ATIVOS"
                  PROMETHEUS="http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090"
                  ALERTS=$(curl -s "$PROMETHEUS/api/v1/alerts" 2>/dev/null | grep -o '"alertname":"[^"]*"' | sort | uniq -c || echo "Prometheus não acessível")
                  echo "$ALERTS"
                  ALERT_COUNT=$(echo "$ALERTS" | grep -c alertname || echo "0")
                  if [ "$ALERT_COUNT" -gt 0 ] 2>/dev/null; then
                    FINDINGS="${FINDINGS}{\"type\":\"active-alerts\",\"count\":$ALERT_COUNT},"
                    [ "$STATUS" = "ok" ] && STATUS="warning"
                  fi

                  echo ""
                  echo "=============================="
                  echo "Digest completo"
                  echo "=============================="

                  # Remove trailing comma from findings
                  FINDINGS=$(echo "$FINDINGS" | sed 's/,$//')

                  # Build JSON result
                  RESULT=$(cat <<ENDJSON
                  {
                    "sentinel": "daily-digest",
                    "timestamp": "$TIMESTAMP",
                    "status": "$STATUS",
                    "findings": [$FINDINGS],
                    "cluster": "kind-velya-local",
                    "summary": {
                      "totalRunningPods": $TOTAL_RUNNING,
                      "totalOtherPods": $TOTAL_FAILED,
                      "nodeCount": $NODE_COUNT,
                      "activeAlerts": $ALERT_COUNT
                    }
                  }
                  ENDJSON
                  )

                  echo "JSON payload: $RESULT"

                  # POST to webhook (best-effort, don't fail the job)
                  curl -s -X POST -H "Content-Type: application/json" \
                    -d "$RESULT" \
                    "${VELYA_WEBHOOK_URL}" \
                    --max-time 5 || true

                  # Create K8s Event for critical findings
                  if [ "$STATUS" = "critical" ]; then
                    SUMMARY="daily-digest: $TOTAL_FAILED non-running pods, $NOT_READY nodes not ready, status=$STATUS"
                    kubectl create event sentinel-daily-digest-alert \
                      --namespace velya-dev-core \
                      --type=Warning \
                      --reason="SentinelAlert" \
                      --message="$SUMMARY" \
                      --field-manager=velya-sentinel 2>/dev/null || true
                  fi
---
# Loop semanal: drift detection — detecta desvios de configuração
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-weekly-drift-detector
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/agent-class: governance
    velya.io/loop: weekly
spec:
  schedule: '0 8 * * 1' # Segunda-feira às 08:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 2
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1200
      backoffLimit: 1
      template:
        metadata:
          labels:
            velya.io/agent-class: governance
        spec:
          serviceAccountName: velya-sentinel-sa
          restartPolicy: OnFailure
          priorityClassName: velya-batch
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: drift-detector
              image: alpine/k8s:1.31.5
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ['ALL']
              env:
                - name: VELYA_WEBHOOK_URL
                  value: 'http://velya-web.velya-dev-web.svc.cluster.local:3000/api/sentinel'
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  echo "=============================="
                  echo "VELYA DRIFT DETECTOR SEMANAL"
                  echo "Data: $(date -u +%Y-%m-%d)"
                  echo "=============================="
                  TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  STATUS="ok"
                  FINDINGS=""

                  ISSUES=0

                  echo ""
                  echo "## VERIFICAÇÃO: Resource Limits"
                  # Detecta containers sem limits definidos
                  for NS in velya-dev-core velya-dev-platform velya-dev-agents velya-dev-web; do
                    MISSING=$(kubectl get pods -n $NS -o json 2>/dev/null | \
                      python3 -c "
                  import json,sys
                  data=json.load(sys.stdin)
                  for item in data.get('items',[]):
                    for c in item['spec'].get('containers',[]):
                      res=c.get('resources',{})
                      if not res.get('limits'):
                        print(item['metadata']['namespace']+'/'+item['metadata']['name']+'/'+c['name'])
                  " 2>/dev/null | head -10)
                    if [ -n "$MISSING" ]; then
                      echo "DRIFT: Containers sem limits em $NS:"
                      echo "$MISSING"
                      MISSING_COUNT=$(echo "$MISSING" | wc -l)
                      FINDINGS="${FINDINGS}{\"type\":\"missing-resource-limits\",\"namespace\":\"$NS\",\"count\":$MISSING_COUNT},"
                      ISSUES=$((ISSUES+1))
                    fi
                  done

                  echo ""
                  echo "## VERIFICAÇÃO: PodDisruptionBudgets"
                  for NS in velya-dev-core velya-dev-platform; do
                    PDB_COUNT=$(kubectl get pdb -n $NS --no-headers 2>/dev/null | wc -l)
                    DEPLOY_COUNT=$(kubectl get deployment -n $NS --no-headers 2>/dev/null | wc -l)
                    echo "  $NS: $PDB_COUNT PDBs para $DEPLOY_COUNT Deployments"
                    if [ "$PDB_COUNT" -lt "$DEPLOY_COUNT" ]; then
                      echo "  DRIFT: Deployments sem PDB em $NS"
                      FINDINGS="${FINDINGS}{\"type\":\"missing-pdb\",\"namespace\":\"$NS\",\"pdbCount\":$PDB_COUNT,\"deploymentCount\":$DEPLOY_COUNT},"
                      ISSUES=$((ISSUES+1))
                    fi
                  done

                  echo ""
                  echo "## VERIFICAÇÃO: ArgoCD Applications"
                  APP_COUNT=$(kubectl get applications -n argocd --no-headers 2>/dev/null | wc -l)
                  if [ "$APP_COUNT" -eq 0 ]; then
                    echo "DRIFT CRÍTICO: Nenhuma Application ArgoCD — GitOps não está ativo"
                    FINDINGS="${FINDINGS}{\"type\":\"argocd-missing\",\"detail\":\"no ArgoCD Applications - GitOps not active\"},"
                    STATUS="critical"
                    ISSUES=$((ISSUES+1))
                  else
                    kubectl get applications -n argocd --no-headers 2>/dev/null
                    FINDINGS="${FINDINGS}{\"type\":\"argocd-apps\",\"count\":$APP_COUNT},"
                  fi

                  echo ""
                  echo "## VERIFICAÇÃO: NetworkPolicies"
                  for NS in velya-dev-core velya-dev-platform velya-dev-agents velya-dev-web; do
                    NP_COUNT=$(kubectl get networkpolicy -n $NS --no-headers 2>/dev/null | wc -l)
                    echo "  $NS: $NP_COUNT NetworkPolicies"
                    if [ "$NP_COUNT" -eq 0 ]; then
                      FINDINGS="${FINDINGS}{\"type\":\"missing-network-policy\",\"namespace\":\"$NS\"},"
                      [ "$STATUS" = "ok" ] && STATUS="warning"
                      ISSUES=$((ISSUES+1))
                    fi
                  done

                  echo ""
                  echo "## RESULTADO: $ISSUES issues de drift detectados"
                  echo "=============================="

                  # Set status based on issue count if not already critical
                  if [ "$STATUS" != "critical" ]; then
                    if [ "$ISSUES" -gt 3 ]; then
                      STATUS="critical"
                    elif [ "$ISSUES" -gt 0 ]; then
                      STATUS="warning"
                    fi
                  fi

                  # Remove trailing comma from findings
                  FINDINGS=$(echo "$FINDINGS" | sed 's/,$//')

                  # Build JSON result
                  RESULT=$(cat <<ENDJSON
                  {
                    "sentinel": "weekly-drift-detector",
                    "timestamp": "$TIMESTAMP",
                    "status": "$STATUS",
                    "findings": [$FINDINGS],
                    "cluster": "kind-velya-local",
                    "issueCount": $ISSUES
                  }
                  ENDJSON
                  )

                  echo "JSON payload: $RESULT"

                  # POST to webhook (best-effort, don't fail the job)
                  curl -s -X POST -H "Content-Type: application/json" \
                    -d "$RESULT" \
                    "${VELYA_WEBHOOK_URL}" \
                    --max-time 5 || true

                  # Create K8s Event for critical findings
                  if [ "$STATUS" = "critical" ]; then
                    SUMMARY="weekly-drift-detector: $ISSUES drift issues detected, status=$STATUS"
                    kubectl create event sentinel-drift-detector-alert \
                      --namespace velya-dev-core \
                      --type=Warning \
                      --reason="SentinelAlert" \
                      --message="$SUMMARY" \
                      --field-manager=velya-sentinel 2>/dev/null || true
                  fi
---
# ServiceAccount para os sentinelas (read-only sobre cluster)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velya-sentinel-sa
  namespace: velya-dev-platform
  labels:
    app.kubernetes.io/part-of: velya-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velya-sentinel-reader
  labels:
    app.kubernetes.io/part-of: velya-platform
rules:
  - apiGroups: ['']
    resources: ['pods', 'nodes', 'namespaces', 'services', 'resourcequotas']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['']
    resources: ['events']
    verbs: ['get', 'list', 'watch', 'create']
  - apiGroups: ['events.k8s.io']
    resources: ['events']
    verbs: ['create']
  - apiGroups: ['apps']
    resources: ['deployments', 'replicasets', 'statefulsets']
    verbs: ['get', 'list']
  - apiGroups: ['autoscaling']
    resources: ['horizontalpodautoscalers']
    verbs: ['get', 'list']
  - apiGroups: ['keda.sh']
    resources: ['scaledobjects', 'scaledjobs', 'triggerauthentications']
    verbs: ['get', 'list']
  - apiGroups: ['policy']
    resources: ['poddisruptionbudgets']
    verbs: ['get', 'list']
  - apiGroups: ['networking.k8s.io']
    resources: ['networkpolicies', 'ingresses']
    verbs: ['get', 'list']
  - apiGroups: ['argoproj.io']
    resources: ['applications', 'appprojects']
    verbs: ['get', 'list']
  - apiGroups: ['monitoring.coreos.com']
    resources: ['prometheusrules', 'servicemonitors']
    verbs: ['get', 'list']
  - apiGroups: ['batch']
    resources: ['jobs', 'cronjobs']
    verbs: ['get', 'list']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velya-sentinel-reader-binding
  labels:
    app.kubernetes.io/part-of: velya-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velya-sentinel-reader
subjects:
  - kind: ServiceAccount
    name: velya-sentinel-sa
    namespace: velya-dev-platform
