---
# ServiceMonitors para todos os serviços Velya
# Permite que o Prometheus scrape métricas de cada serviço
# Os serviços NestJS devem expor /metrics na porta padrão

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: velya-core-services
  namespace: velya-dev-observability
  labels:
    app.kubernetes.io/part-of: velya-platform
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - velya-dev-core
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velya-platform
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: velya-platform-services
  namespace: velya-dev-observability
