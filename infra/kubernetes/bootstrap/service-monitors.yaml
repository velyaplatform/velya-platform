---
# ServiceMonitor para o api-gateway (porta 3000)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: velya-api-gateway
  namespace: velya-dev-observability
  labels:
    app.kubernetes.io/part-of: velya-platform
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - velya-dev-core
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
---
