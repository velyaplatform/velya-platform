apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: patient-flow-scaler
  namespace: velya-dev-core
spec:
  scaleTargetRef:
    name: patient-flow
  minReplicaCount: 1
  maxReplicaCount: 5
  cooldownPeriod: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090
        metricName: container_cpu_usage_seconds_total
        threshold: "0.5"
        query: sum(rate(container_cpu_usage_seconds_total{namespace="velya-dev-core",pod=~"patient-flow-.*"}[2m]))
---
