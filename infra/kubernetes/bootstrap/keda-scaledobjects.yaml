apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: patient-flow-scaler
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/workload-class: realtime-app
spec:
  scaleTargetRef:
    name: patient-flow
  minReplicaCount: 1
  maxReplicaCount: 5
  cooldownPeriod: 60
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 600 # 10min — serviço clínico crítico, não reduz rápido
          policies:
            - type: Pods
              value: 1
              periodSeconds: 300
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.velya-dev-observability.svc.cluster.local:9090
        metricName: container_cpu_usage_seconds_total
        threshold: '0.5'
        query: sum(rate(container_cpu_usage_seconds_total{namespace="velya-dev-core",pod=~"patient-flow-.*"}[2m]))
---
