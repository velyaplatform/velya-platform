apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: velya-staging

namePrefix: staging-

commonLabels:
  velya.io/environment: staging

commonAnnotations:
  velya.io/environment: staging
  velya.io/managed-by: kustomize

resources:
  - ../../base

patches:
  # Staging runs with 2 replicas for basic HA validation
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        replicas: 2
    target:
      kind: Deployment

  # Moderate resource allocation for staging
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        template:
          spec:
            containers:
              - name: app
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
    target:
      kind: Deployment
