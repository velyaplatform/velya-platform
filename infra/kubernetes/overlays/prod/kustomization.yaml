apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: velya-prod

namePrefix: prod-

commonLabels:
  velya.io/environment: prod

commonAnnotations:
  velya.io/environment: prod
  velya.io/managed-by: kustomize

resources:
  - ../../base

patches:
  # Production runs with 3+ replicas for high availability
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        replicas: 3
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 1
    target:
      kind: Deployment

  # Production resource allocation
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        template:
          spec:
            containers:
              - name: app
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: "2"
                    memory: 2Gi
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: topology.kubernetes.io/zone
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/part-of: velya-platform
    target:
      kind: Deployment

  # PodDisruptionBudgets for production workloads
  - patch: |-
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: any
      spec:
        minAvailable: "50%"
    target:
      kind: PodDisruptionBudget
