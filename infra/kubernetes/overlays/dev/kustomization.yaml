apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: velya-dev

namePrefix: dev-

commonLabels:
  velya.io/environment: dev

commonAnnotations:
  velya.io/environment: dev
  velya.io/managed-by: kustomize

resources:
  - ../../base

patches:
  # Scale down replicas for dev environment
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        replicas: 1
    target:
      kind: Deployment

  # Reduce resource requests for dev
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        template:
          spec:
            containers:
              - name: app
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
    target:
      kind: Deployment
