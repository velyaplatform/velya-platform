---
# ArgoCD healer agent — roda a cada 10 minutos
# Detecta OutOfSync/Missing/Degraded e auto-remedia via refresh + sync
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-argocd-healer-agent
  namespace: velya-dev-platform
  labels:
    velya.io/owner: platform-ops
    velya.io/component: autopilot
    velya.io/agent: argocd-healer
    velya.io/layer: "1"
spec:
  schedule: '*/10 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            velya.io/agent: argocd-healer
            velya.io/component: autopilot
            velya.io/layer: "1"
        spec:
          serviceAccountName: velya-autopilot-sa
          priorityClassName: velya-batch-low
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: velya-autopilot-agents:v3
              imagePullPolicy: IfNotPresent
              command: ['npx', 'tsx', 'scripts/agents/run-argocd-healer.ts']
              env:
                - name: VELYA_AUDIT_OUT
                  value: /data/velya-autopilot
                - name: VELYA_DRY_RUN
                  value: 'false'
                # Cooperative locking (ADR-0016 follow-up #1). No-op on
                # images built before lock support; a hazardous rollback
                # requires flipping this to 'false' and re-rolling.
                - name: VELYA_COOPERATIVE_LOCKING
                  value: 'true'
                # When ARGOCD_SERVER/ARGOCD_AUTH_TOKEN unset, the script falls back
                # to kubectl on applications.argoproj.io in the argocd namespace.
                - name: ARGOCD_PROJECT_FILTER
                  value: default
                # Grafana correlation (optional — ConfigMap/Secret are not required to exist)
                - name: GRAFANA_URL
                  valueFrom:
                    configMapKeyRef:
                      name: velya-autopilot-config
                      key: grafana-url
                      optional: true
                - name: GRAFANA_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: velya-autopilot-grafana
                      key: token
                      optional: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ['ALL']
              volumeMounts:
                - name: data
                  mountPath: /data/velya-autopilot
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: velya-autopilot-data
            - name: tmp
              emptyDir: {}

---
# K8s troubleshooter agent — roda a cada 10 minutos
# Valida nodes/PVCs/deployments, troubleshoota pods quebrados via kubectl nativo
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-k8s-troubleshooter-agent
  namespace: velya-dev-platform
  labels:
    velya.io/owner: platform-ops
    velya.io/component: autopilot
    velya.io/agent: k8s-troubleshooter
    velya.io/layer: "1"
spec:
  schedule: '*/10 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            velya.io/agent: k8s-troubleshooter
            velya.io/component: autopilot
            velya.io/layer: "1"
        spec:
          serviceAccountName: velya-autopilot-sa
          priorityClassName: velya-batch-low
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: velya-autopilot-agents:v3
              imagePullPolicy: IfNotPresent
              command: ['npx', 'tsx', 'scripts/agents/run-k8s-troubleshooter.ts']
              env:
                - name: VELYA_AUDIT_OUT
                  value: /data/velya-autopilot
                - name: VELYA_DRY_RUN
                  value: 'false'
                # Cooperative locking (ADR-0016 follow-up #1). No-op on
                # images built before lock support.
                - name: VELYA_COOPERATIVE_LOCKING
                  value: 'true'
                - name: VELYA_NS_ALLOWLIST
