---
# PVC para evidence logs dos agents
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: velya-autopilot-data
  namespace: velya-dev-platform
  labels:
    velya.io/owner: platform-ops
    velya.io/component: autopilot
spec:
  accessModes: ['ReadWriteOnce']
  resources:
    requests:
      storage: 2Gi

---
# Infra health agent — roda a cada 15 minutos
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velya-infra-health-agent
  namespace: velya-dev-platform
  labels:
    velya.io/owner: platform-ops
    velya.io/component: autopilot
    velya.io/agent: infra-health
spec:
  schedule: '*/15 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            velya.io/agent: infra-health
        spec:
          serviceAccountName: velya-autopilot-sa
          priorityClassName: velya-batch-low
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: agent
              image: velya-autopilot-agents:v3
              imagePullPolicy: IfNotPresent
              command: ['npx', 'tsx', 'scripts/agents/run-infra-health.ts']
              env:
                - name: VELYA_AUDIT_OUT
                  value: /data/velya-autopilot
                - name: VELYA_DRY_RUN
                  value: 'false'
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ['ALL']
              volumeMounts:
                - name: data
                  mountPath: /data/velya-autopilot
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: velya-autopilot-data
            - name: tmp
              emptyDir: {}

