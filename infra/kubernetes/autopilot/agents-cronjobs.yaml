# velya-autopilot-agents — Kubernetes CronJobs
#
# Agents autônomos que rodam dentro do cluster velya-dev (kind / EKS) e
# fazem melhoria contínua do frontend, backend e infra.
#
# Complementa os GitHub Actions workflows (ui-audit-daily.yaml,
# frontend-quality-daily.yaml etc) com execução IN-cluster que tem:
#   - kubectl nativo via ServiceAccount
#   - acesso ao velya-audit PVC para evidence logs
#   - acesso aos serviços internos (Prometheus, ArgoCD API)
#   - resposta em tempo real a eventos do cluster

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velya-autopilot-sa
  namespace: velya-dev-platform
  labels:
    velya.io/owner: platform-ops
    velya.io/component: autopilot

---
# RBAC: mínimo necessário para detecção + remediação segura
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velya-autopilot-reader
  labels:
    velya.io/owner: platform-ops
rules:
  # Leitura geral de state da cluster
  - apiGroups: ['']
    resources: ['pods', 'events', 'services', 'endpoints', 'configmaps', 'namespaces', 'nodes']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['deployments', 'statefulsets', 'daemonsets', 'replicasets']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['batch']
    resources: ['jobs', 'cronjobs']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['autoscaling']
    resources: ['horizontalpodautoscalers']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['keda.sh']
    resources: ['scaledobjects', 'scaledjobs', 'triggerauthentications']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['scheduling.k8s.io']
    resources: ['priorityclasses']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['argoproj.io']
    resources: ['applications', 'appprojects']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['networking.k8s.io']
    resources: ['networkpolicies', 'ingresses']
    verbs: ['get', 'list', 'watch']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velya-autopilot-remediator
  labels:
    velya.io/owner: platform-ops
rules:
  # Criar PriorityClass missing (allowlist enforced by controller)
  - apiGroups: ['scheduling.k8s.io']
    resources: ['priorityclasses']
    verbs: ['create']
  # Dedupe duplicate HPAs
  - apiGroups: ['autoscaling']
    resources: ['horizontalpodautoscalers']
    verbs: ['delete']
  # Prune completed Jobs (L2 supervisor) + delete stuck Jobs (L2 health manager)
  - apiGroups: ['batch']
    resources: ['jobs']
    verbs: ['delete', 'patch']
  # Suspend/resume CronJobs (L2 supervisor)
  - apiGroups: ['batch']
    resources: ['cronjobs']
    verbs: ['patch']
  # k8s-troubleshooter-agent: delete Evicted pods, rollout restart deployments
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['delete']
  - apiGroups: ['apps']
    resources: ['deployments']
    verbs: ['patch'] # rollout restart = patch annotation
  # argocd-healer-agent: refresh + sync Applications (patch for operation + annotation)
  - apiGroups: ['argoproj.io']
    resources: ['applications']
    verbs: ['patch', 'update']

---
# Namespace-scoped: criar ServiceAccounts faltantes dentro dos namespaces velya-dev-*
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: velya-autopilot-namespace-remediator
  namespace: velya-dev-core
rules:
  - apiGroups: ['']
    resources: ['serviceaccounts']
    verbs: ['create', 'patch']

