apiVersion: v1
kind: ServiceAccount
metadata:
  name: wazuh-agent
  namespace: velya-security
  labels:
    app.kubernetes.io/name: wazuh-agent
    app.kubernetes.io/component: siem-agent
---
# External secret for agent registration password
# Synced from AWS Secrets Manager via ESO
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-agent-credentials
  namespace: velya-security
  labels:
    app.kubernetes.io/name: wazuh-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: wazuh-agent-credentials
    creationPolicy: Owner
  data:
    - secretKey: registration-password
      remoteRef:
        key: velya/dev/wazuh/agent-registration-password
