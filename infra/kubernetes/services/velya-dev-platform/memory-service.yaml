apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-service
  namespace: velya-dev-platform
  labels:
    app: memory-service
    app.kubernetes.io/name: memory-service
    app.kubernetes.io/part-of: velya-platform
    velya.io/service: memory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-service
  template:
    metadata:
      labels:
        app: memory-service
        velya.io/service: memory-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3040"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: memory-service
          image: velya-memory-service:0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3040
              name: http
          env:
            - name: PORT
              value: "3040"
            - name: SERVICE_NAME
              value: "memory-service"
            - name: SERVICE_VERSION
              value: "0.1.0"
            - name: NODE_ENV
              value: "development"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3040
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3040
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: memory-service
  namespace: velya-dev-platform
  labels:
    app: memory-service
spec:
  selector:
    app: memory-service
  ports:
    - name: http
      port: 3040
      targetPort: 3040
  type: ClusterIP
