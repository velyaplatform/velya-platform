apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velya-web
  namespace: velya-dev-web
  annotations:
    # Use ClusterIP (kube-proxy path) instead of direct pod IPs.
    # Required for kind clusters where nginx runs with hostNetwork=true
    # and cannot directly reach pod IPs across veth pairs.
    nginx.ingress.kubernetes.io/service-upstream: 'true'
spec:
  ingressClassName: nginx
  rules:
    - host: velya.172.19.0.6.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: velya-web
                port:
                  number: 80
