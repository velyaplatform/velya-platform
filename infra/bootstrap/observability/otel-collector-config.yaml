apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: velya-observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kubectl
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector
              scrape_interval: 15s
              static_configs:
                - targets:
                    - 0.0.0.0:8888

    processors:
      batch:
        send_batch_size: 1024
        send_batch_max_size: 2048
        timeout: 5s

      memory_limiter:
        check_interval: 5s
        limit_mib: 512
        spike_limit_mib: 128

      resource:
        attributes:
          - key: cluster.name
            value: velya-cluster
            action: upsert
          - key: platform
            value: velya
            action: upsert

      attributes:
        actions:
          - key: environment
            from_context: metadata.environment
            action: upsert

    exporters:
      prometheusremotewrite:
        endpoint: http://prometheus-server.velya-observability.svc.cluster.local:9090/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        tls:
          insecure: true

      loki:
        endpoint: http://loki-gateway.velya-observability.svc.cluster.local:3100/loki/api/v1/push

      otlp/tempo:
        endpoint: tempo-distributor.velya-observability.svc.cluster.local:4317
        tls:
          insecure: true

      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

      zpages:
        endpoint: 0.0.0.0:55679

    service:
      extensions:
        - health_check
        - zpages

      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - resource
            - batch
          exporters:
            - otlp/tempo
            - debug

        metrics:
          receivers:
            - otlp
            - prometheus
          processors:
            - memory_limiter
            - resource
            - batch
          exporters:
            - prometheusremotewrite
            - debug

        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - resource
            - batch
          exporters:
            - loki
            - debug

      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
