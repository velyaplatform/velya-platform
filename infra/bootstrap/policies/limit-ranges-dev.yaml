apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/managed-by: kubectl
    velya.io/policy: limit-range
    velya.io/environment: dev
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: '4'
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
    - type: Pod
      max:
        cpu: '8'
        memory: 8Gi
    - type: PersistentVolumeClaim
      max:
        storage: 50Gi
      min:
        storage: 1Gi
---
