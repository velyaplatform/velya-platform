apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: velya-dev-observability
  labels:
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/managed-by: kubectl
    velya.io/policy: limit-range
    velya.io/environment: dev
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: '2'
        memory: 4Gi
      min:
        cpu: 25m
        memory: 32Mi
    - type: Pod
      max:
        cpu: '4'
        memory: 8Gi
    - type: PersistentVolumeClaim
      max:
        storage: 100Gi
      min:
        storage: 1Gi
