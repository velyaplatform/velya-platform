# Allow DNS resolution from all velya namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    velya.io/policy: network
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
