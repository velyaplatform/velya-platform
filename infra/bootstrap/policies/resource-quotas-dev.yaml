apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: velya-dev-core
  labels:
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/managed-by: kubectl
    velya.io/policy: resource-quota
    velya.io/environment: dev
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
    requests.storage: 100Gi
