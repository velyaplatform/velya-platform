apiVersion: v1
kind: ResourceQuota
metadata:
  name: frontend-tier-quota
  namespace: velya-dev-core
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "20"
    services: "10"
    services.loadbalancers: "2"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: backend-tier-quota
  namespace: velya-dev-core
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "50"
    services: "20"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-tier-quota
  namespace: velya-dev-platform
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "2Gi"
    limits.cpu: "4"
    limits.memory: "4Gi"
    pods: "30"
    services: "10"
    persistentvolumeclaims: "5"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-agents-tier-quota
  namespace: velya-dev-agents
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "40"
    services: "10"

---
# Pod Disruption Budgets for HA

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: velya-dev-core
spec:
  minAvailable: 1
  selector:
    matchLabels:
      velya.io/tier: frontend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: velya-dev-core
spec:
  minAvailable: 2
  selector:
    matchLabels:
      velya.io/tier: backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-pdb
  namespace: velya-dev-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      velya.io/tier: platform

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-agents-pdb
  namespace: velya-dev-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      velya.io/tier: ai
