apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velya-app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/component: gitops
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/velya-platform/velya-platform.git
    targetRevision: main
    path: infra/kubernetes/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
