apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velya-platform-services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/component: platform
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/velya-platform/velya-platform.git
    targetRevision: main
    path: infra/kubernetes/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: velya-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velya-ai-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/component: ai-gateway
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/velya-platform/velya-platform.git
    targetRevision: main
    path: infra/helm/velya-service
    helm:
      releaseName: ai-gateway
      valueFiles:
        - ../../kubernetes/overlays/dev/ai-gateway-values.yaml
      parameters:
        - name: image.repository
          value: ghcr.io/velya-platform/ai-gateway
        - name: service.port
          value: "8080"
  destination:
    server: https://kubernetes.default.svc
    namespace: velya-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velya-agent-orchestrator
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: velya-platform
    app.kubernetes.io/component: agent-orchestrator
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/velya-platform/velya-platform.git
    targetRevision: main
    path: infra/helm/velya-service
    helm:
      releaseName: agent-orchestrator
      valueFiles:
        - ../../kubernetes/overlays/dev/agent-orchestrator-values.yaml
      parameters:
        - name: image.repository
          value: ghcr.io/velya-platform/agent-orchestrator
        - name: service.port
          value: "8080"
  destination:
    server: https://kubernetes.default.svc
    namespace: velya-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
