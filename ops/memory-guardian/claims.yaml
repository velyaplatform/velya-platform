# Memory Guardian — Repo Invariants
#
# Declarative list of invariants that memory-guardian enforces against this
# repo (both in CI via .github/workflows/memory-guardian.yaml and in-cluster
# via infra/kubernetes/memory-guardian/cronjob.yaml).
#
# This file is the repo-side projection of the user's Claude memory index
# (~/.claude/projects/-home-jfreire/memory/). Each entry is traced back to
# the memory that requires it.
#
# Claim kinds:
#   file_exists       — the given path must exist in the repo
#   file_contains     — the given path must exist AND match the regex
#   dir_exists        — the given directory must exist
#   all_match_pair    — every file matching `glob` must have a matching
#                       file at `pair_template` (substitutes ${name})
#
# Exit behavior: memory-guardian fails the run (and the CI job) if any
# `severity: critical` claim is violated. `severity: warning` claims are
# reported but do not fail.

schema_version: 1
generated_by: manual + ~/.claude/memory-enforcement/sync.sh
last_updated: 2026-04-11

