  - id: every-agent-script-has-doc
    memory: feedback_argocd_healer_esteira
    kind: all_match_pair
    glob: scripts/agents/run-*.ts
    pair_template: .claude/agents/${name}-agent.md
    # Legacy docs without the -agent suffix also count (mirrors
    # autopilot-agents-ci.yaml smoke-all-agents assertion).
    pair_fallback_template: .claude/agents/${name}.md
    # Transform: strip leading "run-" from script basename before substituting
    name_transform: "strip_prefix:run-"
    severity: critical

  - id: every-agent-script-has-cronjob-entry
    memory: feedback_argocd_healer_esteira
    kind: file_contains_each
    path: infra/kubernetes/autopilot/agents-cronjobs.yaml
    each_glob: scripts/agents/run-*.ts
    name_transform: "strip_suffix:.ts"
    severity: critical

